apiVersion: apps/v1
kind: Deployment
metadata:
  name: online-book-store
spec:
  replicas: 2
  selector:
    matchLabels:
      app: online-book-store
  template:
    metadata:
      labels:
        app: online-book-store
    spec:
      containers:
      - name: online-book-store
        image: vivin0905/online-book-store:latest
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: online-book-store-service
spec:
  type: NodePort
  selector:
    app: online-book-store
  ports:
  - port: 80
    targetPort: 3000
    nodePort: 30007
